services:
  e2e-db:
    image: postgres:15
    environment:
      POSTGRES_DB: cupcake_e2e
      POSTGRES_USER: cupcake
      POSTGRES_PASSWORD: cupcake
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cupcake"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - cupcake-e2e-net

  e2e-redis:
    image: redis:7-alpine
    networks:
      - cupcake-e2e-net

  e2e-app:
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile
    environment:
      POSTGRES_NAME: cupcake_e2e
      POSTGRES_DB: cupcake_e2e
      POSTGRES_USER: cupcake
      POSTGRES_PASSWORD: cupcake
      POSTGRES_HOST: e2e-db
      POSTGRES_PORT: "5432"
      SECRET_KEY: e2e-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CORS_ORIGIN_WHITELIST: "http://localhost:4200,http://localhost:4201,http://localhost:8099"
      CORS_ALLOW_ALL_ORIGINS: "True"
      REDIS_URL: redis://e2e-redis:6379/0
      REDIS_HOST: e2e-redis
      REDIS_PORT: "6379"
      REDIS_DB_RQ: "3"
      ENABLE_RQ_TASKS: "False"
      ENABLE_CUPCAKE_MACARON: "True"
      ENABLE_CUPCAKE_MINT_CHOCOLATE: "True"
      ENABLE_CUPCAKE_SALTED_CARAMEL: "True"
      ENABLE_CUPCAKE_RED_VELVET: "True"
      USE_WHISPER: "False"
    volumes:
      - e2e-media:/app/media
      - e2e-static:/app/staticfiles
    depends_on:
      e2e-db:
        condition: service_healthy
      e2e-redis:
        condition: service_started
    networks:
      - cupcake-e2e-net
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py setup_e2e_data &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  e2e-nginx:
    image: nginx:1.27-alpine
    ports:
      - "8099:80"
    volumes:
      - e2e-media:/media:ro
      - e2e-static:/app/staticfiles:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - e2e-app
    networks:
      - cupcake-e2e-net

configs:
  nginx_conf:
    content: |
      upstream django_backend {
          server e2e-app:8000;
      }

      server {
          listen 80;
          server_name _;

          client_max_body_size 2G;

          location /static/ {
              alias /app/staticfiles/;
              expires 30d;
              add_header Cache-Control "public, immutable";
          }

          location /internal/media/ {
              internal;
              alias /media/;
              add_header Access-Control-Allow-Origin $upstream_http_x_accel_cors_origin always;
              add_header Access-Control-Allow-Credentials "true" always;
              add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
              access_log off;
          }

          location /media/temp/ {
              return 403;
          }

          location /media/ {
              alias /media/;
              expires 7d;
              add_header Cache-Control "public";
          }

          location /api/ {
              proxy_pass http://django_backend;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_redirect off;
              proxy_buffering off;
              proxy_read_timeout 300s;
              proxy_connect_timeout 75s;
          }

          location /admin/ {
              proxy_pass http://django_backend;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_redirect off;
          }

          location /ws/ {
              proxy_pass http://django_backend;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_cache_bypass $http_upgrade;
              proxy_redirect off;
              proxy_read_timeout 86400;
              proxy_send_timeout 86400;
          }

          location /health/ {
              proxy_pass http://django_backend;
          }

          error_page 500 502 503 504 /50x.html;
          location = /50x.html {
              root /usr/share/nginx/html;
          }
      }

volumes:
  e2e-media:
  e2e-static:

networks:
  cupcake-e2e-net:
