name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: cupcake_vanilla_pass
          POSTGRES_USER: cupcake_vanilla
          POSTGRES_DB: cupcake_vanilla_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          venv-${{ runner.os }}-${{ matrix.python-version }}-

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Install project
      run: poetry install --no-interaction

    - name: Run pre-commit hooks
      run: |
        poetry run pre-commit install
        poetry run pre-commit run --all-files

    - name: Run tests
      env:
        DATABASE_URL: postgresql://cupcake_vanilla:cupcake_vanilla_pass@localhost:5432/cupcake_vanilla_db
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        DEBUG: 'True'
        DJANGO_SETTINGS_MODULE: cupcake_vanilla.settings
        ENABLE_CUPCAKE_MACARON: 'true'
        ENABLE_CUPCAKE_MINT_CHOCOLATE: 'true'
        ENABLE_CUPCAKE_RED_VELVET: 'true'
        ENABLE_CUPCAKE_SALTED_CARAMEL: 'true'
      run: |
        poetry run python manage.py migrate
        poetry run python manage.py collectstatic --noinput
        poetry run python manage.py test \
          ccc.tests.test_base \
          ccc.tests.test_annotations \
          ccc.tests.test_chunked_upload \
          ccc.tests.test_device_token \
          ccc.tests.test_appliance \
          ccc.tests.test_plugin \
          ccv.tests \
          ccm.tests \
          ccmc.tests \
          ccrv.tests \
          ccsc.tests \
          --verbosity=2

  test-wails:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies-wails
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-wails-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          venv-wails-${{ runner.os }}-${{ matrix.python-version }}-

    - name: Install dependencies
      if: steps.cached-poetry-dependencies-wails.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Install project
      run: poetry install --no-interaction

    - name: Test Wails environment with SQLite Django backend and Redis
      env:
        WAILS_DEBUG: 'true'
        SECRET_KEY: test-wails-secret-key
        WAILS_APP_DATA: /tmp/wails-test
        REDIS_HOST: localhost
        REDIS_PORT: '6379'
        REDIS_URL: redis://localhost:6379
      run: |
        poetry run pytest

  test-plugin-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: cupcake_vanilla_pass
          POSTGRES_USER: cupcake_vanilla
          POSTGRES_DB: cupcake_vanilla_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://cupcake_vanilla:cupcake_vanilla_pass@localhost:5432/cupcake_vanilla_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      DEBUG: 'True'
      DJANGO_SETTINGS_MODULE: cupcake_vanilla.settings
      ALLOWED_HOSTS: 'localhost,127.0.0.1'
      ENABLE_CUPCAKE_MACARON: 'true'
      ENABLE_CUPCAKE_MINT_CHOCOLATE: 'true'
      ENABLE_CUPCAKE_RED_VELVET: 'true'
      ENABLE_CUPCAKE_SALTED_CARAMEL: 'true'
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ci-password-123
      DJANGO_BASE_URL: http://127.0.0.1:8000
      PLUGIN_BASE_URL: http://127.0.0.1:8001

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies-plugin
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-plugin-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          venv-plugin-${{ runner.os }}-3.12-

    - name: Install dependencies
      if: steps.cached-poetry-dependencies-plugin.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Install project
      run: poetry install --no-interaction

    - name: Migrate and seed admin user
      run: |
        poetry run python manage.py migrate
        poetry run python tests/plugin_integration/create_admin.py

    - name: Start Django server
      run: |
        poetry run python manage.py runserver 8000 &
        echo $! > /tmp/django.pid
        until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/plugins/ | grep -q .; do sleep 1; done

    - name: Start test plugin server
      run: |
        poetry run python tests/plugin_integration/plugin_server.py \
          --host 127.0.0.1 --port 8001 \
          --backend http://127.0.0.1:8000 \
          --username "$ADMIN_USERNAME" --password "$ADMIN_PASSWORD" &
        echo $! > /tmp/plugin.pid
        until curl -sf http://127.0.0.1:8001/manifest -o /dev/null; do sleep 1; done

    - name: Run plugin integration tests
      run: |
        poetry run pytest tests/plugin_integration/test_plugin_integration.py -v

    - name: Stop servers
      if: always()
      run: |
        kill $(cat /tmp/plugin.pid) 2>/dev/null || true
        kill $(cat /tmp/django.pid) 2>/dev/null || true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies-lint
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-lint-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          venv-lint-${{ runner.os }}-3.12-

    - name: Install dependencies
      if: steps.cached-poetry-dependencies-lint.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root --only dev

    - name: Run linters
      run: |
        poetry run black --check .
        poetry run isort --check-only .
        poetry run flake8 .
